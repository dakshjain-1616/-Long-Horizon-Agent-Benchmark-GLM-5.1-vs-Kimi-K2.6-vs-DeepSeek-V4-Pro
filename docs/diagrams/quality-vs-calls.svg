<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="-apple-system, system-ui, Segoe UI, Roboto, sans-serif" font-size="13">
  <rect data-bg="true" width="100%" height="100%" fill="#ffffff"/>
  <text x="480" y="30" text-anchor="middle" font-weight="700" font-size="18" fill="#111827">Quality vs Tool-Call Count — what we measure</text>
  <text x="480" y="50" text-anchor="middle" fill="#6b7280">GLM-5.1 claims to keep improving past 50 tool calls. The benchmark verifies this independently.</text>

  <!-- axes -->
  <g stroke="#1f2937" stroke-width="1.5">
    <line x1="100" y1="450" x2="900" y2="450"/>
    <line x1="100" y1="80" x2="100" y2="450"/>
  </g>

  <!-- y label -->
  <text x="32" y="265" text-anchor="middle" font-weight="600" fill="#374151" transform="rotate(-90 32 265)">Quality score (0 - 1)</text>
  <!-- x label -->
  <text x="500" y="510" text-anchor="middle" font-weight="600" fill="#374151">Tool-call count</text>

  <!-- y ticks -->
  <g font-size="11" fill="#6b7280" text-anchor="end">
    <line x1="95" y1="450" x2="100" y2="450" stroke="#1f2937"/><text x="92" y="454">0.0</text>
    <line x1="95" y1="376" x2="100" y2="376" stroke="#1f2937"/><text x="92" y="380">0.2</text>
    <line x1="95" y1="302" x2="100" y2="302" stroke="#1f2937"/><text x="92" y="306">0.4</text>
    <line x1="95" y1="228" x2="100" y2="228" stroke="#1f2937"/><text x="92" y="232">0.6</text>
    <line x1="95" y1="154" x2="100" y2="154" stroke="#1f2937"/><text x="92" y="158">0.8</text>
    <line x1="95" y1="80" x2="100" y2="80" stroke="#1f2937"/><text x="92" y="84">1.0</text>
  </g>

  <!-- x ticks 0..100 -->
  <g font-size="11" fill="#6b7280" text-anchor="middle">
    <line x1="100" y1="450" x2="100" y2="455" stroke="#1f2937"/><text x="100" y="470">0</text>
    <line x1="260" y1="450" x2="260" y2="455" stroke="#1f2937"/><text x="260" y="470">20</text>
    <line x1="420" y1="450" x2="420" y2="455" stroke="#1f2937"/><text x="420" y="470">40</text>
    <line x1="580" y1="450" x2="580" y2="455" stroke="#1f2937"/><text x="580" y="470">60</text>
    <line x1="740" y1="450" x2="740" y2="455" stroke="#1f2937"/><text x="740" y="470">80</text>
    <line x1="900" y1="450" x2="900" y2="455" stroke="#1f2937"/><text x="900" y="470">100</text>
  </g>

  <!-- gridlines -->
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="100" y1="376" x2="900" y2="376"/>
    <line x1="100" y1="302" x2="900" y2="302"/>
    <line x1="100" y1="228" x2="900" y2="228"/>
    <line x1="100" y1="154" x2="900" y2="154"/>
  </g>

  <!-- vertical "plateau zone" annotation -->
  <rect x="180" y="80" width="140" height="370" fill="#fee2e2" opacity="0.35"/>
  <text x="250" y="100" text-anchor="middle" font-size="11" fill="#991b1b">10–20 calls: most</text>
  <text x="250" y="115" text-anchor="middle" font-size="11" fill="#991b1b">models plateau</text>

  <!-- Curves
       Each path interpolates between (calls, score) sample points.
       Curves are illustrative — actual numbers populate when you run `make plots`. -->

  <!-- Kimi K2.6 (purple) — plateaus around step 25 -->
  <path d="M100,450 C140,420 200,260 260,200 S400,165 500,170 S700,180 900,200"
        fill="none" stroke="#a855f7" stroke-width="2.5"/>
  <text x="900" y="195" text-anchor="end" font-weight="700" fill="#581c87">Kimi K2.6</text>

  <!-- DeepSeek V4-Pro (blue) — keeps improving slowly -->
  <path d="M100,450 C140,415 220,290 320,210 S540,130 700,115 S840,100 900,95"
        fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="900" y="92" text-anchor="end" font-weight="700" fill="#1e3a8a">DeepSeek V4-Pro</text>

  <!-- GLM-5.1 (green) — claim: continues improving long after others plateau -->
  <path d="M100,450 C140,425 240,310 380,200 S620,105 800,90 S880,85 900,82"
        fill="none" stroke="#10b981" stroke-width="3"/>
  <text x="900" y="80" text-anchor="end" font-weight="700" fill="#065f46">GLM-5.1 (claim)</text>

  <!-- annotation arrows -->
  <line x1="260" y1="200" x2="260" y2="160" stroke="#581c87" stroke-width="1.2"/>
  <text x="260" y="150" text-anchor="middle" font-size="11" fill="#581c87">plateau begins</text>

  <line x1="700" y1="115" x2="700" y2="60" stroke="#1e3a8a" stroke-width="1.2"/>
  <text x="700" y="50" text-anchor="middle" font-size="11" fill="#1e3a8a">slow gains continue</text>

  <text x="500" y="540" text-anchor="middle" fill="#6b7280" font-size="11">Curves illustrative. Real numbers populate `outputs/quality_vs_calls.png` once you run `lhb benchmark` on each model.</text>
</svg>
